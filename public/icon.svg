<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#1e3a8a"></stop>
      <stop offset="42%" stop-color="#020617"></stop>
      <stop offset="100%" stop-color="#000000"></stop>
    </radialGradient>

    <linearGradient id="blueBill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"></stop>
      <stop offset="100%" stop-color="#1d4ed8"></stop>
    </linearGradient>

    <linearGradient id="greenBill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"></stop>
      <stop offset="100%" stop-color="#047857"></stop>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"></stop>
      <stop offset="45%" stop-color="#f59e0b"></stop>
      <stop offset="100%" stop-color="#92400e"></stop>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity="0.55"></feDropShadow>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"></rect>

  <!-- glow circle -->
  <circle cx="256" cy="210" r="165" fill="#1d4ed8" opacity="0.12"></circle>
  <circle cx="256" cy="210" r="118" fill="#22c55e" opacity="0.10"></circle>

  <!-- dollar bill -->
  <g transform="rotate(-10 185 180)" filter="url(#shadow)">
    <rect x="92" y="116" width="210" height="118" rx="22" fill="url(#greenBill)"></rect>
    <rect x="113" y="138" width="168" height="74" rx="15" fill="none" stroke="#d1fae5" stroke-width="6" opacity="0.75"></rect>
    <circle cx="197" cy="175" r="32" fill="#064e3b" opacity="0.45"></circle>
    <text x="197" y="188" text-anchor="middle" font-family="Arial" font-size="58" font-weight="900" fill="white">$</text>
  </g>

  <!-- TL bill -->
  <g transform="rotate(9 320 182)" filter="url(#shadow)">
    <rect x="214" y="112" width="214" height="122" rx="22" fill="url(#blueBill)"></rect>
    <rect x="236" y="135" width="170" height="76" rx="15" fill="none" stroke="#dbeafe" stroke-width="6" opacity="0.75"></rect>
    <circle cx="321" cy="174" r="34" fill="#1e40af" opacity="0.45"></circle>
    <text x="321" y="189" text-anchor="middle" font-family="Arial" font-size="62" font-weight="900" fill="white">₺</text>
  </g>

  <!-- gold bars -->
  <g filter="url(#shadow)">
    <path d="M153 264H282L307 326H126L153 264Z" fill="url(#gold)"></path>
    <path d="M176 278H257L270 312H160L176 278Z" fill="#fde68a" opacity="0.35"></path>
    <text x="216" y="308" text-anchor="middle" font-family="Arial" font-size="24" font-weight="900" fill="#78350f">ALTIN</text>

    <path d="M254 252H385L410 316H228L254 252Z" fill="url(#gold)"></path>
    <path d="M278 267H359L372 302H262L278 267Z" fill="#fde68a" opacity="0.35"></path>
    <text x="319" y="297" text-anchor="middle" font-family="Arial" font-size="24" font-weight="900" fill="#78350f">GOLD</text>
  </g>

  <!-- coins -->
  <g filter="url(#shadow)">
    <circle cx="138" cy="334" r="32" fill="url(#gold)"></circle>
    <circle cx="138" cy="334" r="22" fill="none" stroke="#fff7ed" stroke-width="5" opacity="0.55"></circle>
    <text x="138" y="344" text-anchor="middle" font-family="Arial" font-size="26" font-weight="900" fill="#78350f">₺</text>

    <circle cx="376" cy="340" r="34" fill="url(#gold)"></circle>
    <circle cx="376" cy="340" r="23" fill="none" stroke="#fff7ed" stroke-width="5" opacity="0.55"></circle>
    <text x="376" y="350" text-anchor="middle" font-family="Arial" font-size="28" font-weight="900" fill="#78350f">$</text>
  </g>

  <!-- main title -->
  <text x="256" y="415" text-anchor="middle" font-family="Arial" font-size="38" font-weight="900" fill="#ffffff" filter="url(#softGlow)">
    KOLAY MUHASEBE
  </text>

  <!-- subtitle -->
  </svg>